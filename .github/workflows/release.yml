name: Release

# Build and publish the macOS DMG/ZIP to GitHub Releases on every version tag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    # Single Apple Silicon runner cross-builds both arches — Intel (macos-13)
    # hosted runners are retired and jobs targeting them queue forever.
    runs-on: macos-14
    name: macOS arm64 + x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Refuse to publish an un-notarized release: without the signing cert,
      # downloads would show "damaged" on Apple Silicon. Fail fast instead.
      - name: Require signing secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            echo "::error::Signing secrets not configured — refusing to publish an unsigned build. Add CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID as repo secrets."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # node-gyp needs distutils if any native dep falls back to a source build
      # (better-sqlite3 v12 has no Node 20 prebuilds; Node 22+ is covered, this is insurance).
      - name: Ensure Python setuptools for node-gyp
        run: python3 -m pip install --break-system-packages setuptools || pip3 install setuptools

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Build client
        run: npm run build

      - name: Build and publish (electron-builder)
        run: npx electron-builder --mac --arm64 --x64 --config electron-builder.config.js --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (Developer ID Application cert, base64) + notarization.
          # When these secrets are unset the build stays signed-or-unsigned and
          # skips notarization instead of failing (see electron-builder.config.js).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
