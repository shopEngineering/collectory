name: Release

# Build and publish the macOS DMG/ZIP to GitHub Releases on every version tag.
# Signs with a Developer ID cert and notarizes when the signing secrets are set;
# if they are absent it skips cleanly (no unsigned "damaged" build ever ships).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    # Single Apple Silicon runner cross-builds both arches — Intel (macos-13)
    # hosted runners are retired and jobs targeting them queue forever.
    runs-on: macos-14
    name: macOS arm64 + x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for signing secrets
        id: signing
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Signing secrets not configured — skipping the build so no unsigned release is published. Add CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID to enable automated signed releases."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.signing.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Ensure Python setuptools for node-gyp
        if: steps.signing.outputs.ready == 'true'
        run: python3 -m pip install --break-system-packages setuptools || pip3 install setuptools

      - name: Install root dependencies
        if: steps.signing.outputs.ready == 'true'
        run: npm ci

      - name: Install client dependencies
        if: steps.signing.outputs.ready == 'true'
        run: npm --prefix client ci

      - name: Build client
        if: steps.signing.outputs.ready == 'true'
        run: npm run build

      - name: Build, sign, notarize, publish (electron-builder)
        if: steps.signing.outputs.ready == 'true'
        run: npx electron-builder --mac --arm64 --x64 --config electron-builder.config.js --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
