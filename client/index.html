<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Collectory</title>
    <meta name="description" content="Local-first collection manager. No servers, no cloud, no telemetry." />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS PWA (apple-touch-icon is authoritative on iOS) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Collectory" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#131512" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f3f0e8" media="(prefers-color-scheme: light)" />

    <script>
      // Apply persisted theme before first paint to avoid flash.
      (function () {
        try {
          var stored = localStorage.getItem('collectory:theme');
          var mode = stored || 'system';
          var resolved = mode;
          if (mode === 'system') {
            resolved = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
